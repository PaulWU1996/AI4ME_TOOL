services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: pipeline_redis
    ports:
      - "6379:6379"
      - "8001:8001" # Redis Insight 管理界面

  controller:
    build: ./controller
    container_name: pipeline_controller
    ports:
      - "9000:9000"
    volumes:
      - ./temp_data:/app/tmp
      - ./data:/app/data
    environment:
      - SHARED_PATH=/app/tmp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    platform: linux/amd64
    depends_on:
      - redis

  worker:
    build: ./worker
    container_name: pipeline_worker
    volumes:
      - ./temp_data:/app/tmp
      - ./data:/app/data
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # --- 关键：在这里注入 Service 的连接信息 ---
      - AUDIO_HOST=service4_audio
      - AUDIO_PORT=9002
      - VISUAL_HOST=service3_visual
      - VISUAL_PORT=9001
    # 生产建议：如果不是在 Mac/Windows 调试，可以去掉 --pool=solo 改用 -c 2
    command: celery -A tasks worker --loglevel=info --pool=solo
    platform: linux/amd64
    depends_on:
      - redis
      - service4_audio # 确保音频服务启动后再启动 worker

  # 假设这是你的音频处理服务
  service4_audio:
    image: your_audio_engine_image
    container_name: service4_audio
    ports:
      - "9002:9002"
    volumes:
      - ./temp_data:/app/tmp # 必须挂载同一个目录
    environment:
      - SHARED_PATH=/app/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ] # 如果需要 GPU 加速
