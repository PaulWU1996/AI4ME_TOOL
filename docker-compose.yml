services:

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=60
      - CURL_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ai_network

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379" # communication port
      - "8001:8001" # Redis Insight GUI
    networks:
      - ai_network
    restart: unless-stopped

  controller:
    build: ./controller
    container_name: controller
    ports:
      - "9000:9000"
    volumes:
      - ./shared:/app/tmp
      - ./data:/app/data
    environment:
      - SHARED_PATH=/app/tmp
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - ai_network
    restart: unless-stopped

  worker:
    build: ./worker
    container_name: worker
    volumes:
      - ./shared:/app/tmp
      - ./data:/app/data
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUDIO_HOST=audioservice
      - AUDIO_PORT=8000
      - VISUAL_HOST=visualservice
      - VISUAL_PORT=8000
      - SHARED_PATH=/app/tmp
      - ADMIN_KEY=ai4me_admin_password # Replace with actual admin password
    command: celery -A tasks worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - audioservice
      - visualservice
    networks:
      - ai_network
    restart: unless-stopped

  audioservice:
    image: audioservice:latest
    container_name: audioservice
    ports:
      - "9002:8000"
    volumes:
      - ./shared:/app/tmp
      - ./weights:/app/weights
    environment:
      - SHARED_PATH=/app/tmp
      - MODEL_PATH=/app/weights/PPALUniEncRdFc3Llama31_8B_s2/checkpoint-final
    command: python3 -m uvicorn src.audio_entry:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - ai_network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 5m
    labels:
      - autoheal=true

  visualservice:
    image: narrative-api:latest
    container_name: visualservice
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    environment:
      - ADMIN_KEY=ai4me_admin_password # Replace with actual admin password
      - API_KEY_PATH=/app/data
    volumes:
      - ./weights/models:/app/models
      - ./shared/api-data:/app/data
    ports:
      - "9001:8000"
    networks:
      - ai_network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 5m
    labels:
      - autoheal=true

networks:
  ai_network:
    driver: bridge
